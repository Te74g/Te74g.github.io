<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Projector light beam">
  <defs>
    <linearGradient id="beamGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd89a" stop-opacity="0.00"/>
      <stop offset="18%" stop-color="#ffd89a" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#ffcf86" stop-opacity="0.28"/>
      <stop offset="75%" stop-color="#ffcf86" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffd89a" stop-opacity="0.00"/>
    </linearGradient>

    <radialGradient id="hotspot" cx="0" cy="1" r="1.2">
      <stop offset="0%" stop-color="#ffe6b8" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#ffe6b8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffe6b8" stop-opacity="0.00"/>
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- beam cone -->
  <g filter="url(#blur)">
    <path d="M0 900 L280 760 L1600 0 L1600 900 Z" fill="url(#beamGrad)"/>
    <ellipse cx="120" cy="860" rx="220" ry="140" fill="url(#hotspot)"/>
  </g>
</svg>
