<!--
  ═══════════════════════════════════════════════════════
  あにあめもりあ サイト構造クイックリファレンス
  ═══════════════════════════════════════════════════════

  ディレクトリ構成:
    pages/          HTMLページ (このファイルはここにコピー)
    js/             ページ固有JS (page.js → js/pagename.js)
    css/parts/      CSSモジュール (page.css → css/parts/pagename.css)
    _config/        データファイル (window.xxxData グローバルとして提供)
    assets/         画像・ファビコン等
    _templates/     このディレクトリ（テンプレート置き場）

  スクリプト読み込み順の理由:
    1. common-layout.js + renderLayout()  ヘッダー/フッターを即時描画
    2. _config/data_*.js                  window.xxxData グローバルを定義
    3. utils.js                           window.fixPath / shouldShowItem 等を定義
    4. ui.js                              .reveal / .is-visible の IntersectionObserver
    5. pagename.js                        ページ固有処理（上記すべてに依存）

  data ファイル → グローバル変数 対応:
    data_members.js  →  window.membersData    キャスト一覧
    data_news.js     →  window.newsData       お知らせ一覧
    data_events.js   →  window.eventsData     イベント一覧
    data_gallery.js  →  window.galleryData    ギャラリー
    data_links.js    →  window.linksData      関連リンク
    data_site.js     →  window.siteConfig     サイト設定 / castDisplay 等

  renderLayout(rootPath) のパス引数:
    pages/ 配下のページ  →  renderLayout('../')
    ルート直下のページ   →  renderLayout('./')
    gallery/index.html   →  renderLayout('../')
  ═══════════════════════════════════════════════════════
-->
