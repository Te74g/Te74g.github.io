<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あにあめもりあ | ニュース一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;600;700;900&family=Zen+Old+Mincho:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="../assets/favicon/multi_favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="bg-texture">
    <a class="skip-link" href="#main">本文へスキップ</a>

    <div id="header-placeholder"></div>

    <main id="main">
        <section class="section news-page-section">
            <div class="container">
                <header class="section-head reveal">
                    <h1 class="section-title cafe-signboard">ニュース一覧</h1>
                </header>

                <div class="perf-strip" aria-hidden="true"></div>

                <div class="toolbar reveal">
                    <div class="field">
                        <div id="news-tag-filter" class="tag-filter-buttons">
                            <button class="tag-filter-btn is-active" data-value="all">すべて</button>
                            <button class="tag-filter-btn" data-value="お知らせ">お知らせ</button>
                            <button class="tag-filter-btn" data-value="レポート">レポート</button>
                            <button class="tag-filter-btn" data-value="アップデート">アップデート</button>
                            <button class="tag-filter-btn" data-value="キャンペーン">キャンペーン</button>
                            <button class="tag-filter-btn" data-value="公募">公募</button>
                            <button class="tag-filter-btn" data-value="その他">その他</button>
                        </div>
                    </div>
                </div>

                <div class="news-panel">
                    <div id="news-list-container" class="news-grid">
                        <!-- Generated by news.js -->
                    </div>
                </div>

                <div style="margin-top: 40px; text-align: center;">
                    <a href="../index.html" class="btn btn--primary">トップへ戻る</a>
                </div>
        </section>
    </main>


    <div id="footer-placeholder"></div>
    <script src="../js/common-layout.js"></script>
    <script>
        renderLayout('../');
    </script>


    <!-- Data Files -->
    <script src="../_config/data_site.js"></script>
    <script src="../_config/data_members.js"></script>
    <script src="../_config/data_news.js"></script>
    <script src="../_config/data_events.js"></script>
    <script src="../_config/data_gallery.js"></script>
    <script src="../_config/data_links.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/news.js"></script>
</body>

</html>
