<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition showcase — tenstock</title>
    <link rel="stylesheet" href="../_shared/base.css">
    <link rel="stylesheet" href="../_shared/mood.css">
    <link rel="stylesheet" href="../_shared/motion-primitives.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="ts-section-root tr-root">
    <nav class="ts-nav"><a href="../home.html">← tenstock</a></nav>

    <div class="tr-gallery">

        <!-- 01 台形ダブル（cute） -->
        <article class="tr-cell mood-cute" data-genre="イベント間">
            <div class="tr-stage tr-01">
                <div class="tr-01-bg"></div>
                <div class="tr-01-portraits">
                    <img class="tr-01-p tr-01-p--1" src="../../assets/motif/ten.webp" alt="">
                    <img class="tr-01-p tr-01-p--2" src="../../assets/motif/Wfox.webp" alt="">
                    <img class="tr-01-p tr-01-p--3" src="../../assets/motif/Bcat.webp" alt="">
                </div>
                <div class="tr-01-trap tr-01-trap--a"></div>
                <div class="tr-01-trap tr-01-trap--b"></div>
            </div>
            <p class="tr-label"><b>01</b> 台形ダブル</p>
        </article>

        <!-- 02 ラジアルクリップ（cool） -->
        <article class="tr-cell mood-cool" data-genre="セクション間">
            <div class="tr-stage tr-02">
                <div class="tr-02-cover"></div>
                <div class="tr-02-kv" aria-hidden="true">
                    <span class="tr-02-kv-label">section</span>
                </div>
            </div>
            <p class="tr-label"><b>02</b> ラジアルクリップ</p>
        </article>

    </div>

</body>
</html>
