<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>提携イベント編集</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>

<div class="editor-header">
    <h1 id="editor-title">提携イベントを追加</h1>
    <!-- 確認なし -->
</div>

<div class="editor-scroll">

    <div class="cols-2">
        <div class="form-group">
            <label>ID <span class="required">*</span></label>
            <input type="text" id="f-id" placeholder="例: kitsunekotan">
        </div>
        <div class="form-group">
            <label>主催者名</label>
            <input type="text" id="f-organizer" placeholder="例: あきあき">
        </div>
    </div>

    <div class="form-group">
        <label>イベント名 <span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="例: 休憩処 キツネコタン">
    </div>

    <div class="form-group">
        <label>開催日程・スケジュール</label>
        <textarea id="f-date" rows="2" placeholder="例: 第1・3 木曜日&#10;22:00～23:00（HTMLの &lt;br&gt; も使えます）"></textarea>
    </div>

    <div class="form-group">
        <label>簡単な説明（一覧表示用）</label>
        <input type="text" id="f-desc" placeholder="例: 毎週木曜日開催のキツネのお茶会です">
    </div>

    <hr class="divider">
    <div class="section-label">詳細説明（HTML）</div>

    <div class="form-group">
        <label>概要説明</label>
        <textarea id="f-description" rows="5" placeholder="<p>イベントの詳しい説明...</p>"></textarea>
    </div>

    <div class="form-group">
        <label>詳細情報（日時・場所など）</label>
        <textarea id="f-details" rows="5" placeholder="<h3>イベント詳細</h3>&#10;<ul><li>...</li></ul>"></textarea>
    </div>

    <hr class="divider">
    <div class="section-label">画像</div>

    <div class="cols-2">
        <div class="form-group">
            <label>ロゴ（一覧表示）</label>
            <div class="img-row">
                <img class="img-thumb" id="img-logo" src="" alt="" style="display:none;">
                <span class="img-path" id="path-logo">未選択</span>
                <button class="btn-img-pick" id="pick-logo">📂</button>
            </div>
        </div>
        <div class="form-group">
            <label>タイトル画像</label>
            <div class="img-row">
                <img class="img-thumb" id="img-titleImage" src="" alt="" style="display:none;">
                <span class="img-path" id="path-titleImage">未選択</span>
                <button class="btn-img-pick" id="pick-titleImage">📂</button>
            </div>
        </div>
    </div>

    <div class="cols-2">
        <div class="form-group">
            <label>ポスター</label>
            <div class="img-row">
                <img class="img-thumb" id="img-poster" src="" alt="" style="display:none;">
                <span class="img-path" id="path-poster">未選択</span>
                <button class="btn-img-pick" id="pick-poster">📂</button>
            </div>
        </div>
        <div class="form-group">
            <label>背景画像</label>
            <div class="img-row">
                <img class="img-thumb" id="img-backgroundImage" src="" alt="" style="display:none;">
                <span class="img-path" id="path-backgroundImage">未選択</span>
                <button class="btn-img-pick" id="pick-backgroundImage">📂</button>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>主催者ロゴ</label>
        <div class="img-row">
            <img class="img-thumb" id="img-organizerLogo" src="" alt="" style="display:none;">
            <span class="img-path" id="path-organizerLogo">未選択</span>
            <button class="btn-img-pick" id="pick-organizerLogo">📂</button>
        </div>
    </div>

    <div class="form-group">
        <label>ヘッダーテキストカラー（省略可）</label>
        <input type="text" id="f-headerTextColor" placeholder="例: white">
    </div>

    <div class="form-group">
        <label style="display:flex;align-items:center;cursor:pointer;">
            <input type="checkbox" id="f-hidden"> 非表示
        </label>
    </div>

</div>

<div class="editor-footer">
    <button class="btn-cancel" id="btn-cancel">キャンセル</button>
    <span class="status-msg" id="status-msg"></span>
    <button class="btn-publish" id="btn-publish">公開する</button>
</div>

<script>
'use strict';

let mode = 'add';
const localPaths = {};
const repoPaths  = {};

/* ── 初期化（編集モード） ── */
window.api.onInit((data) => {
    if (data && data.event) {
        mode = 'edit';
        document.getElementById('editor-title').textContent = '提携イベントを編集';
        const ev = data.event;
        document.getElementById('f-id').value             = ev.id || '';
        document.getElementById('f-id').disabled          = true;
        document.getElementById('f-name').value           = ev.name || '';
        document.getElementById('f-organizer').value      = ev.organizer || '';
        document.getElementById('f-date').value           = ev.date || '';
        document.getElementById('f-desc').value           = ev.desc || '';
        document.getElementById('f-description').value    = ev.description || '';
        document.getElementById('f-details').value        = ev.details || '';
        document.getElementById('f-headerTextColor').value= ev.headerTextColor || '';
        document.getElementById('f-hidden').checked       = !!ev.hidden;

        const imageFields = ['image','logo','titleImage','poster','backgroundImage','organizerLogo'];
        imageFields.forEach(f => {
            if (ev[f]) {
                repoPaths[f] = ev[f];
                const pathEl = document.getElementById(`path-${f}`);
                if (pathEl) pathEl.textContent = ev[f];
            }
        });
    }
});

/* ── 画像選択ヘルパー ── */
function setupImagePick(fieldName) {
    const btn = document.getElementById(`pick-${fieldName}`);
    if (!btn) return;
    btn.addEventListener('click', async () => {
        const lp = await window.api.pickImage();
        if (!lp) return;
        localPaths[fieldName] = lp;
        document.getElementById(`path-${fieldName}`).textContent = lp.split(/[\\/]/).pop();
        document.getElementById(`img-${fieldName}`).src = lp;
        document.getElementById(`img-${fieldName}`).style.display = '';
    });
}
['logo','titleImage','poster','backgroundImage','organizerLogo'].forEach(setupImagePick);

/* ── 公開 ── */
document.getElementById('btn-publish').addEventListener('click', async () => {
    const id   = document.getElementById('f-id').value.trim();
    const name = document.getElementById('f-name').value.trim();
    if (!id)   return alert('IDを入力してください');
    if (!name) return alert('イベント名を入力してください');

    setStatus('保存中...', 'saving');
    document.getElementById('btn-publish').disabled = true;

    try {
        // 画像をコピー
        const imgFields = ['logo','titleImage','poster','backgroundImage','organizerLogo'];
        for (const f of imgFields) {
            if (localPaths[f]) {
                const ext = localPaths[f].split('.').pop();
                const dest = `assets/partner_events/${id}/${f}.${ext}`;
                repoPaths[f] = await window.api.copyImageToAssets(localPaths[f], dest);
            }
        }

        const ev = {
            id,
            hidden:          document.getElementById('f-hidden').checked || undefined,
            name,
            organizer:       document.getElementById('f-organizer').value.trim() || undefined,
            date:            document.getElementById('f-date').value || undefined,
            desc:            document.getElementById('f-desc').value.trim() || undefined,
            description:     document.getElementById('f-description').value || undefined,
            details:         document.getElementById('f-details').value || undefined,
            image:           repoPaths.logo || repoPaths.image || undefined,
            titleImage:      repoPaths.titleImage || undefined,
            poster:          repoPaths.poster || undefined,
            backgroundImage: repoPaths.backgroundImage || undefined,
            organizerLogo:   repoPaths.organizerLogo || undefined,
            headerTextColor: document.getElementById('f-headerTextColor').value.trim() || undefined,
            link:            `partner_events/event/?id=${id}`,
        };
        Object.keys(ev).forEach(k => ev[k] === undefined && delete ev[k]);

        const items = await window.api.readData('events');
        const idx = items.findIndex(i => i.id === id);
        if (idx >= 0) items[idx] = ev;
        else items.unshift(ev);
        await window.api.writeData('events', items);

        const files = ['data/events.js'];
        Object.values(repoPaths).filter(Boolean).forEach(p => files.push(p));
        await window.api.commitToGitHub([...new Set(files)], `提携イベント${mode === 'add' ? '追加' : '更新'}: ${name}`);

        setStatus('✅ 公開しました！', 'ok');
        setTimeout(() => window.api.closeEditor(), 1500);

    } catch (err) {
        setStatus(`❌ ${err.message}`, 'error');
        document.getElementById('btn-publish').disabled = false;
    }
});

document.getElementById('btn-cancel').addEventListener('click', () => window.api.closeEditor());

function setStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
}
</script>
</body>
</html>
