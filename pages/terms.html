<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あにあめもりあ | 利用規約</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;600;700;900&family=Zen+Old+Mincho:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="../assets/favicon/multi_favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <div id="header-placeholder"></div>

    <main id="main" class="bg-texture">
        <section class="section">
            <div class="container reveal">
                <h1 id="debug-trigger" role="button" tabindex="0"
                    style="user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: manipulation; cursor: pointer; outline: none;">
                    利用規約</h1>
                <p>（ここに利用規約の本文が入ります）</p>
                <p>このウェブサイトの利用にあたっての規約です。</p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../js/common-layout.js"></script>
    <script>
        renderLayout('../');
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const secretTrigger = document.getElementById('debug-trigger');
            if (secretTrigger) {
                let clickCount = 0;
                let clickTimer = null;

                const triggerAction = (e) => {
                    // タップズームやテキスト選択などのデフォルト挙動を完全に防ぐ
                    if (e.type === 'touchstart') {
                        e.preventDefault();
                    }

                    clickCount++;

                    if (clickTimer) clearTimeout(clickTimer);

                    // 1秒タップが空いたらリセット
                    clickTimer = setTimeout(() => {
                        clickCount = 0;
                    }, 1000);

                    if (clickCount >= 10) {
                        clickCount = 0; // すぐにリセット

                        // setTimeoutに入れることでiOSのalert表示バグを回避
                        setTimeout(() => {
                            const password = prompt('【DEBUG】 パスワードを入力してください：');

                            if (password) {
                                // data_site.js を直接読んでいなくてもここで直接照合（もしくはオブジェクトがあれば読む）
                                const correctPassword = window.siteConfig?.debugMode?.password || 'tetenpuipui';
                                if (password === correctPassword) {
                                    sessionStorage.setItem('debugMode', 'true');
                                    alert('デバッグモードが有効になりました。\\n隠し要素がすべて公開された状態で表示されます。');
                                    window.location.reload();
                                } else {
                                    alert('パスワードが違います。');
                                }
                            }
                        }, 50);
                    }
                };

                // pointerdown（最近の標準）、touchstart（iOS特効薬）、click（PC保険）全てに対応
                secretTrigger.addEventListener('pointerdown', triggerAction);
                secretTrigger.addEventListener('touchstart', triggerAction, { passive: false });
            }
        });
    </script>
</body>

</html>
