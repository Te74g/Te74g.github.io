<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>あにあめもりあ — プレビュー</title>
    <meta name="description" content="動物たちが人間に化けて情報収集をするカフェ「あにあめもりあ」">

    <!-- Shared styles (header, footer, layout, variables, etc.) -->
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Top page specific styles -->
    <link rel="stylesheet" href="../css/parts/top.css">
</head>
<body id="top">

    <!-- Header injected by common-layout.js -->
    <div id="header-placeholder"></div>

    <main id="main">

        <!-- =============================================
             § Hero — 220vh scroll morph container
             ============================================= -->
        <section class="top-hero" id="top-hero" aria-label="ヒーロー">
            <div class="top-hero__stage">

                <!-- Background texture (JS sets background-image from siteConfig.heroImages.background) -->
                <div class="top-hero__stage-bg" id="top-stage-bg" aria-hidden="true"></div>

                <!-- Dark overlay (opacity driven by --overlay-opacity, JS sets it) -->
                <div class="top-hero__overlay" aria-hidden="true"></div>

                <!-- Key Visual: image path read from siteConfig.heroImages.character -->
                <div class="top-hero__kv" id="top-kv">
                    <img
                        class="top-hero__kv-img"
                        id="top-kv-img"
                        src=""
                        alt="キャラクター"
                        loading="eager"
                        draggable="false"
                    >
                </div>

                <!-- Copy block: logo + random subtitle -->
                <div class="top-hero__copy" id="top-copy" aria-live="polite">
                    <div class="top-hero__logo">
                        <img
                            class="top-hero__logo-img"
                            id="top-logo-img"
                            src=""
                            alt="あにあめもりあ"
                            draggable="false"
                        >
                    </div>
                    <p class="top-hero__subtitle" id="top-subtitle"></p>
                </div>

                <!-- CTA buttons -->
                <div class="top-hero__actions" id="top-actions">
                    <a class="top-btn top-btn--primary" href="../cast/">キャストを見る</a>
                    <a class="top-btn top-btn--secondary" href="../schedule/">スケジュール</a>
                </div>

                <!-- Scroll cue indicator -->
                <div class="top-hero__scrollcue" id="top-scrollcue" aria-hidden="true">
                    <span class="top-hero__scrollcue-line"></span>
                    <span class="top-hero__scrollcue-text">SCROLL</span>
                </div>

                <!-- ─── Latest news (in-hero layer) ───
                     z-index 1, behind KV (z-index 3).
                     Revealed as KV morphs to upper-left.
                     JS controls --lh-opacity / --lc-opacity / pointer-events.
                -->
                <div class="top-latest-hero" id="top-latest-hero" aria-label="最新情報">
                    <h2 class="top-latest-hero__heading" id="top-latest-heading">最新情報</h2>
                    <div
                        class="top-latest-hero__cards"
                        id="top-latest-cards"
                        role="list"
                    >
                        <!-- Injected by top.js § initLatest() -->
                    </div>
                </div>

            </div><!-- /.top-hero__stage -->
        </section><!-- /.top-hero -->

        <!-- =============================================
             § Latest section — reduced-motion fallback
             display:none by default; top.js shows it when
             prefers-reduced-motion is active.
             ============================================= -->
        <section
            class="top-latest-section"
            id="top-latest-section"
            aria-hidden="true"
            aria-label="最新情報"
        >
            <div class="top-latest-section__inner">
                <h2 class="top-latest-hero__heading">最新情報</h2>
                <div
                    class="top-latest-hero__cards"
                    id="top-latest-section-cards"
                    role="list"
                >
                    <!-- Injected by top.js § initLatest() -->
                </div>
            </div>
        </section>

        <!-- =============================================
             § Cast Preview — 4 fully-public members
             ============================================= -->
        <section class="top-cast reveal" id="top-cast" aria-label="キャスト紹介">
            <div class="top-cast__inner">
                <header class="top-cast__head">
                    <h2 class="top-cast__title">キャスト紹介</h2>
                    <p class="top-cast__title-sub">CAST</p>
                </header>

                <div class="top-cast__grid" id="top-cast-grid" role="list">
                    <!-- Injected by top.js § initCastPreview() -->
                </div>

                <div class="top-cast__more">
                    <a class="top-btn top-btn--outline" href="../cast/">全キャストを見る</a>
                </div>
            </div>
        </section>

        <!-- =============================================
             § Concept — aboutSection.text from data_site.js
             (文言はデータ準拠。top.js が inject する)
             ============================================= -->
        <section class="top-concept reveal" id="top-concept" aria-label="あにあめもりあとは">
            <div class="top-concept__inner">
                <header class="top-concept__head">
                    <h2 class="top-concept__title">あにあめもりあとは？</h2>
                    <p class="top-concept__title-sub">ABOUT</p>
                </header>

                <div class="top-concept__blocks" id="top-concept-blocks">
                    <!-- Injected by top.js § initConcept() -->
                </div>
            </div>
        </section>

        <!-- =============================================
             § Guide — Navigation to key pages
             ============================================= -->
        <section class="top-guide reveal" id="top-guide" aria-label="ページ案内">
            <div class="top-guide__inner">
                <header class="top-guide__head">
                    <h2 class="top-guide__title">もっと探索する</h2>
                    <p class="top-guide__title-sub">GUIDE</p>
                </header>

                <div class="top-guide__links">
                    <a class="top-guide-link reveal" href="../cast/">
                        <span class="top-guide-link__icon" aria-hidden="true">🎭</span>
                        <div class="top-guide-link__title">キャスト紹介</div>
                        <p class="top-guide-link__desc">個性豊かな動物・妖怪・スタッフたちのプロフィールをご覧ください</p>
                    </a>
                    <a class="top-guide-link reveal" href="../schedule/">
                        <span class="top-guide-link__icon" aria-hidden="true">📅</span>
                        <div class="top-guide-link__title">スケジュール</div>
                        <p class="top-guide-link__desc">イベントの開催日程や出演キャスト情報をチェック</p>
                    </a>
                    <a class="top-guide-link reveal" href="../news/">
                        <span class="top-guide-link__icon" aria-hidden="true">📢</span>
                        <div class="top-guide-link__title">お知らせ</div>
                        <p class="top-guide-link__desc">最新のイベント情報やお知らせをお届けします</p>
                    </a>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer injected by common-layout.js -->
    <div id="footer-placeholder"></div>

    <!-- ─── Scripts ───
         Load order:
           1. Data configs (synchronous, define globals)
           2. utils.js (defines fixPath, isMemberVisible, etc.)
           3. common-layout.js → renderLayout (injects header/footer DOM)
           4. top.js (reads DOM, injects data, starts morph engine)

         ⚠ ui.js is intentionally NOT loaded here.
           ui.js triggers maintenanceMode redirect.
           All ui.js functionality is re-implemented in top.js §1.
    -->
    <script src="../data/site.js"></script>
    <script src="../data/members.js"></script>
    <script src="../data/news.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/common-layout.js"></script>
    <script>renderLayout('../');</script>
    <script src="../js/top.js"></script>

</body>
</html>
