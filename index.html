<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あにあめもりあ | ホーム</title>
  <meta name="description" content="あにあめもりあ公式サイト：イベント情報・キャスト紹介・お問い合わせ" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;600;700;900&family=Zen+Old+Mincho:wght@400;600;700;900&display=swap"
    rel="stylesheet">
  <link rel="icon" href="./assets/favicon/multi_favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<div id="opening-loader-overlay">
  <div class="loader-logo-container">
    <div class="logo-wrapper">
      <img src="./assets/logo/aniamemoria_logo.webp" alt="Loading..." class="loader-logo-back">
      <img src="./assets/logo/aniamemoria_logo.webp" alt="" class="loader-logo-front">
    </div>
    <p class="loader-text">Loading...</p>
  </div>
</div>
<a class="skip-link" href="#main">本文へスキップ</a>

<div id="header-placeholder"></div>

<main id="main">
  <div id="kv-scroll-zone">
    <!-- Hero Section -->
    <section id="hero-section">
      <!-- Flash Overlay -->
      <div class="hero-flash"></div>

      <div class="hero-content">
        <img class="hero-character" src="./assets/opening/Tatie3.webp" alt="Character">
        <img class="hero-logo" src="./assets/logo/aniamemoria_logo.webp" alt="AniameMoria">
        <p class="hero-subtitle">AniameMoria</p>

        <!-- Scroll Down Indicator -->
        <div class="scroll-down">
          <span>SCROLL</span>
          <div class="scroll-down-arrow"></div>
        </div>
      </div>
      <!-- Cast Reveal Hero Overlay: Desktop only (right side of hero) -->
      <div id="cast-reveal-hero" style="display:none;"></div>
    </section>
  </div><!-- /#kv-scroll-zone -->

  <!-- Content Board (Wrapper for continuous background) -->
  <div id="content-board" class="bg-texture news-overlap">

    <!-- Today / Tomorrow Cast Banner (above News) -->
    <section id="cast-reveal-overlay" class="section u-pb-xs" style="display:none;">
      <div class="container" style="max-width: 860px;">
        <header class="section-head reveal" style="margin-bottom: 16px;">
          <h2 class="section-title cafe-signboard">Cast Reveal</h2>
          <p class="section-lead">キャスト公開情報</p>
        </header>
        <div id="cast-reveal-banner"></div>
      </div>
    </section>

    <!-- News Section (Carousel) -->
    <section id="news-section" class="section u-pb-xs">
      <div class="container" style="max-width: 1000px;">
        <header class="section-head reveal" style="margin-bottom: 10px;">
          <h2 class="section-title cafe-signboard">News</h2>
          <p class="section-lead">更新情報</p>
        </header>

        <div class="news-carousel-container reveal">
          <button class="carousel-nav-btn carousel-prev" id="carousel-prev" aria-label="Previous">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>

          <div class="news-carousel-track" id="news-carousel-track">
            <!-- Items will be injected by script.js -->
          </div>

          <button class="carousel-nav-btn carousel-next" id="carousel-next" aria-label="Next">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </div>

      </div>
    </section>

    <!-- Divider (News <-> Pickup): Balanced to be higher (closer to News, further from Pickup) -->
    <div class="cafe-separator" style="margin-top: 20px; margin-bottom: 60px;">
      <span class="cafe-separator-icon"></span>
    </div>

    <!-- Random Pickup Section -->
    <section class="section u-pt-xs random-pickup-section">
      <div class="container">
        <header class="section-head reveal" style="margin-bottom: 30px;">
          <h2 class="section-title cafe-signboard">Random Pickup</h2>
          <p class="section-lead">本日のピックアップキャスト（ランダム）</p>
        </header>
        <div id="random-pickup-grid" class="cheki-grid">
          <!-- Populated by script.js -->
        </div>
        <div class="cta-actions" style="justify-content:center; margin-top:20px;">
          <a class="btn btn--ghost" href="./cast/">全員を見る</a>
        </div>
      </div>
    </section>

    <!-- Divider (Pickup <-> About): Narrower spacing -->
    <div class="cafe-separator" style="margin: 20px auto;">
      <span class="cafe-separator-icon"></span>
    </div>

    <!-- About Section -->
    <section id="about-section" class="section u-pt-md u-pb-lg">
      <div class="container">
        <header class="section-head reveal">
          <h2 class="section-title cafe-signboard">About</h2>
          <p class="section-lead">あにあめもりあとは？</p>
        </header>
        <div class="section-body reveal about-content">
          <div class="about-text">
            <div class="parchment-frame"
              style="margin-bottom: 0; min-height: 200px; display: flex; flex-direction: column; justify-content: center;">
              <div class="about-text-content">
                <!-- Text populated by JS -->
              </div>
              <div class="watermark-logo"></div>
            </div>
          </div>
          <div class="about-image">
            <img src="" alt="About Character">
          </div>
        </div>
      </div>
    </section>

  </div><!-- /#content-board -->

  <style>
    /* Parallax Fix: Content Sections must act as cover */
    /* layout.css の #main { padding-top: var(--header-h) } はID特殊性(0-1-0-0)のため
       タイプセレクタ main(0-0-0-1)では負ける。#main で上書きして特殊性を揃え、
       ソース順（後勝ち）でこちらを優先させる。 */
    #main {
      padding-top: 0;
      /* #kv-scroll-zone (200vh) が高さを提供するため不要 */
      position: relative;
    }

    /* Apply Texture to Sections to cover Hero */
    /* Apply Texture to Sections to cover Hero */
    /* Apply Texture to Sections to cover Hero */
    .bg-texture {
      background-color: var(--bg);
    }

    /* Content Board Wrapper */
    #content-board {
      position: relative;
      z-index: 2;
      /* Sit above fixed Hero (-1) */
      width: 100%;
    }

    /* Top Divider for News Section (Washi/Torn Effect) */
    .news-overlap {
      margin-top: -15vh;
      /* Pull up over Hero */
      padding-top: 80px;
      /* Text clearance */

      /* Jagged Torn Edge using Clip-path */
      /* Pattern: High-Low-High-Low... organic random-ish */
      clip-path: polygon(0% 40px,
          2% 25px,
          5% 45px,
          8% 20px,
          12% 50px,
          15% 30px,
          20% 55px,
          23% 35px,
          28% 60px,
          32% 25px,
          35% 50px,
          40% 30px,
          45% 55px,
          50% 25px,
          55% 50px,
          58% 30px,
          62% 55px,
          68% 25px,
          72% 50px,
          75% 35px,
          80% 55px,
          85% 30px,
          88% 50px,
          92% 25px,
          95% 45px,
          100% 20px,
          100% 100%,
          0% 100%);
      /* Ensure background is visible */
    }

    .section {
      position: relative;
      /* z-index: 2;  <-- Lowered default so Pickup can be higher if needed, or keep 2.
           But Pickup needs to pull UP over the News padding/gap. */
      z-index: 2;
      /* background-color: var(--bg); Replaced by .bg-texture class on element */
    }

    /* Fix for 3D Carousel Gap */
    .random-pickup-section {
      margin-top: -12px;
      /* Pull up to cover carousel extra space */
      position: relative;
      z-index: 10;
      /* Ensure it sits on top if overlapping occurs */
    }

    /* =====================================================
       Cast Reveal Banner
       ===================================================== */
    /* Desktop: show as hero right-side overlay */
    #cast-reveal-hero {
      position: absolute;
      top: 50%;
      right: 2vw;
      transform: translateY(-50%);
      z-index: 10;
      width: min(400px, 40vw);
    }

    /* Both desktop and mobile show the section above News */

    .cast-reveal-group {
      margin-bottom: 20px;
    }

    .cast-reveal-group-label {
      font-family: 'Zen Old Mincho', serif;
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      color: var(--accent-gold, #cfaa6b);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .cast-reveal-group-label::before,
    .cast-reveal-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
    }

    .cast-reveal-group-label::before {
      background: linear-gradient(270deg, rgba(207, 170, 107, 0.5), transparent);
    }

    .cast-reveal-group-label::after {
      background: linear-gradient(90deg, rgba(207, 170, 107, 0.5), transparent);
    }


    .cast-reveal-cards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Each card */
    .cast-reveal-card {
      position: relative;
      display: flex;
      align-items: stretch;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      flex: 1;
      min-width: 240px;
      max-width: 420px;
      height: 110px;
      background: linear-gradient(135deg, rgba(42, 33, 24, 0.97) 0%, rgba(26, 19, 17, 0.98) 100%);
      border: 1px solid rgba(207, 170, 107, 0.25);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .cast-reveal-card:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(207, 170, 107, 0.5);
      border-color: rgba(207, 170, 107, 0.6);
    }

    /* Gloss shine sweep on hover */
    .cast-reveal-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 35%, rgba(255, 255, 255, 0.07) 50%, transparent 65%);
      background-size: 200% 100%;
      background-position: 200% 0;
      transition: background-position 0.5s ease;
      pointer-events: none;
      z-index: 5;
      border-radius: 12px;
    }

    .cast-reveal-card:hover::before {
      background-position: -50% 0;
    }

    /* Left: character image panel */
    .cast-reveal-img-wrap {
      position: relative;
      width: 100px;
      min-width: 100px;
      height: 110px;
      overflow: hidden;
      flex-shrink: 0;
      background: #111;
    }

    .cast-reveal-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      transition: opacity 0.3s ease;
    }

    .cast-reveal-img-wrap .img-hover {
      opacity: 0;
    }

    .cast-reveal-card:hover .img-hover {
      opacity: 1;
    }

    .cast-reveal-card:hover .img-base {
      opacity: 0;
    }

    /* Right: text info */
    .cast-reveal-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 16px;
      gap: 4px;
      position: relative;
      z-index: 2;
    }

    .cast-reveal-tag {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent-gold, #cfaa6b);
      text-transform: uppercase;
    }

    .cast-reveal-name {
      font-family: 'Zen Old Mincho', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      line-height: 1.2;
    }

    .cast-reveal-date {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* Tomorrow variant: muted/silhouette style — warm sepia instead of cool gray */
    .cast-reveal-card.is-tomorrow {
      border-color: rgba(180, 130, 60, 0.1);
      background: linear-gradient(135deg, #23160b 0%, #170d06 100%);
    }

    .cast-reveal-card.is-tomorrow:hover {
      border-color: rgba(207, 170, 107, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(207, 170, 107, 0.2);
    }

    .cast-reveal-card.is-tomorrow .cast-reveal-tag {
      color: rgba(255, 255, 255, 0.4);
    }

    .cast-reveal-card.is-tomorrow .cast-reveal-name {
      color: rgba(255, 255, 255, 0.5);
    }

    .cast-reveal-card.is-tomorrow .cast-reveal-date {
      color: rgba(255, 255, 255, 0.35);
    }

    /* Gold accent bar on left edge (today only — horizontal cards / hero overlay) */
    .cast-reveal-card.is-today::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #cfaa6b, #8a6a30);
      border-radius: 12px 0 0 12px;
      z-index: 6;
    }

    /* Reduced margin for tighter layout */
    .section-head {
      margin-bottom: 20px !important;
    }

    footer,
    #footer-placeholder {
      position: relative;
      z-index: 2;
      /* background-color: var(--bg); Replaced by .bg-texture */
    }

    /* About Section Layout */
    .about-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .about-text {
      flex: 1;
      /* text-align: left; handled by frame default */
      line-height: 2;
    }

    .about-image {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .about-image img {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
    }

    /* Mobile: Stack Vertical (Text Top, Image Bottom) */
    @media (max-width: 768px) {

      /* Hero 右サイドオーバーレイはデスクトップ専用: スマホでは非表示 */
      /* モバイルでは #cast-reveal-overlay セクション(コンテンツボード内)が代わりに表示される */
      #cast-reveal-hero {
        display: none !important;
      }

      .about-content {
        flex-direction: column;
        text-align: center;
      }

      .about-text {
        text-align: left;
        /* Keep text left-aligned inside frame usually? Or user wants centered? Profile is left. */
        width: 100%;
      }
    }
  </style>


</main>

<div id="footer-placeholder"></div>
<!-- Data Files -->
<script src="./data/members.js"></script>
<script src="./data/news.js"></script>
<script src="./data/events.js"></script>
<script src="./data/gallery.js"></script>
<script src="./data/links.js"></script>
<script src="./data/site.js"></script>
<script type="module" src="./js/bootstrap/home.bootstrap.js"></script>
</body>

</html>
