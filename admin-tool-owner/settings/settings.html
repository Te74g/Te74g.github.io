<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>設定</title>
<style>
:root {
    --bg:       #0f0f1a;
    --surface:  #191928;
    --surface-2:#22223a;
    --border:   #2e2e50;
    --accent:   #cfaa6b;
    --text:     #e8e8ee;
    --muted:    #7a7a9a;
    --danger:   #e74c3c;
    --success:  #27ae60;
    --radius:   8px;
    --font:     'Segoe UI','Hiragino Sans','Meiryo',sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
.header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
}
.header h1 { font-size: 1rem; color: var(--accent); }

.scroll { flex: 1; overflow-y: auto; padding: 20px 24px; }

.section-label {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 16px; }
.form-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
}
input[type="text"],
input[type="password"] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.88rem;
    padding: 9px 12px;
    outline: none;
    font-family: var(--font);
    transition: border-color 0.15s;
}
input:focus { border-color: var(--accent); }
.hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

.folder-row {
    display: flex;
    gap: 8px;
}
.folder-row input { flex: 1; }
.btn-browse {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 9px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
}
.btn-browse:hover { background: var(--border); }

.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #1a1a00;
    padding: 10px 28px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
}
.btn-save:hover { background: #e8c47a; }
.btn-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    padding: 10px 20px;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.15s;
}
.btn-close:hover { background: var(--surface-2); }

.status-msg { flex: 1; font-size: 0.82rem; }
.status-msg.ok    { color: var(--success); }
.status-msg.error { color: var(--danger); }
.status-msg.info  { color: var(--muted); }

.token-guide {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.7;
    margin-top: 8px;
}
.token-guide strong { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
    <h1>⚙️ 設定</h1>
</div>

<div class="scroll">

    <div class="section-label">サイトフォルダ</div>

    <div class="form-group">
        <label>ローカルのサイトフォルダ（Te74g.github.io）</label>
        <div class="folder-row">
            <input type="text" id="f-sitePath" placeholder="例: C:\Users\user\Desktop\unti\Te74g.github.io">
            <button class="btn-browse" id="browse-btn">📂 参照</button>
        </div>
        <div class="hint">このフォルダ内の data/ ファイルを直接編集します。</div>
    </div>

    <hr class="divider">
    <div class="section-label">GitHub 設定</div>

    <div class="form-group">
        <label>Personal Access Token（PAT）</label>
        <input type="password" id="f-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <div class="token-guide">
            📋 PAT の取得方法：<br>
            GitHub → <strong>Settings</strong> → <strong>Developer settings</strong> →
            <strong>Personal access tokens</strong> → <strong>Tokens (classic)</strong> →
            <strong>Generate new token</strong><br>
            権限: <strong>repo</strong> にチェックを入れてください。
        </div>
    </div>

    <div class="form-group">
        <label>オーナー名（GitHubユーザー名）</label>
        <input type="text" id="f-owner" placeholder="例: Te74g">
    </div>

    <div class="form-group">
        <label>リポジトリ名</label>
        <input type="text" id="f-repo" placeholder="例: Te74g.github.io">
    </div>

    <div class="form-group">
        <label>ブランチ名</label>
        <input type="text" id="f-branch" placeholder="例: main">
    </div>

    <hr class="divider">
    <div class="section-label">テスト接続</div>

    <button class="btn-browse" id="test-btn" style="width:100%;padding:10px;">
        🔌 GitHub接続をテスト
    </button>
    <div id="test-result" style="margin-top:8px;font-size:0.82rem;"></div>

</div>

<div class="footer">
    <button class="btn-close" id="btn-close">閉じる</button>
    <span class="status-msg" id="status-msg"></span>
    <button class="btn-save" id="btn-save">保存して再起動</button>
</div>

<script>
'use strict';

/* ── 初期値を設定から読み込む ── */
async function loadSettings() {
    const settings = await window.api.getAllSettings();
    document.getElementById('f-sitePath').value = settings.sitePath || '';
    document.getElementById('f-token').value    = settings.githubToken || '';
    document.getElementById('f-owner').value    = settings.owner || 'Te74g';
    document.getElementById('f-repo').value     = settings.repo  || 'Te74g.github.io';
    document.getElementById('f-branch').value   = settings.branch || 'main';
}

/* ── フォルダ参照 ── */
document.getElementById('browse-btn').addEventListener('click', async () => {
    const folder = await window.api.browseFolder();
    if (folder) document.getElementById('f-sitePath').value = folder;
});

/* ── 接続テスト ── */
document.getElementById('test-btn').addEventListener('click', async () => {
    const result = document.getElementById('test-result');
    result.textContent = '接続中...';
    result.style.color = 'var(--muted)';

    const token = document.getElementById('f-token').value.trim();
    const owner = document.getElementById('f-owner').value.trim();
    const repo  = document.getElementById('f-repo').value.trim();

    if (!token || !owner || !repo) {
        result.textContent = '❌ トークン・オーナー・リポジトリを入力してください';
        result.style.color = 'var(--danger)';
        return;
    }

    try {
        await window.api.testGitHubConnection(token, owner, repo);
        result.textContent = `✅ 接続成功！ ${owner}/${repo} にアクセスできました`;
        result.style.color = 'var(--success, #27ae60)';
    } catch (err) {
        result.textContent = `❌ 接続失敗: ${err.message}`;
        result.style.color = 'var(--danger, #e74c3c)';
    }
});

/* ── 保存 ── */
document.getElementById('btn-save').addEventListener('click', async () => {
    const sitePath = document.getElementById('f-sitePath').value.trim();
    const token    = document.getElementById('f-token').value.trim();
    const owner    = document.getElementById('f-owner').value.trim();
    const repo     = document.getElementById('f-repo').value.trim();
    const branch   = document.getElementById('f-branch').value.trim() || 'main';

    if (!sitePath) return setStatus('❌ サイトフォルダを選択してください', 'error');
    if (!token)    return setStatus('❌ GitHubトークンを入力してください', 'error');
    if (!owner)    return setStatus('❌ オーナー名を入力してください', 'error');
    if (!repo)     return setStatus('❌ リポジトリ名を入力してください', 'error');

    await window.api.setSetting('sitePath',     sitePath);
    await window.api.setSetting('githubToken',  token);
    await window.api.setSetting('owner',        owner);
    await window.api.setSetting('repo',         repo);
    await window.api.setSetting('branch',       branch);

    setStatus('✅ 保存しました。サーバーを再起動します…', 'ok');

    // サーバー再起動（サイトパスが変わったとき）
    await window.api.restartServer();
    setTimeout(() => window.api.closeEditor(), 1200);
});

document.getElementById('btn-close').addEventListener('click', () => window.api.closeEditor());

function setStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
}

loadSettings();
</script>
</body>
</html>
