<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ニュース編集 [運営]</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>

<div class="editor-header">
    <h1 id="editor-title">ニュースを追加</h1>
    <span class="badge-owner">👑 運営版</span>
</div>

<div class="editor-scroll">

    <div class="form-group">
        <label>ID <span class="required">*</span></label>
        <input type="text" id="f-id" placeholder="例: event_20260401（英数字・アンダースコア）">
        <div class="hint">URLの一部になります。スペース不可。後から変更不可。</div>
    </div>

    <div class="cols-2">
        <div class="form-group">
            <label>日付 <span class="required">*</span></label>
            <input type="date" id="f-date">
        </div>
        <div class="form-group">
            <label>カテゴリ <span class="required">*</span></label>
            <select id="f-category">
                <option value="お知らせ">お知らせ</option>
                <option value="レポート">レポート</option>
                <option value="アップデート">アップデート</option>
                <option value="キャンペーン">キャンペーン</option>
                <option value="公募">公募</option>
                <option value="その他">その他</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>タイトル <span class="required">*</span></label>
        <input type="text" id="f-title" placeholder="例: ○○イベント開催のお知らせ">
    </div>

    <div class="form-group">
        <label>簡単な説明（一覧表示用）</label>
        <input type="text" id="f-desc" placeholder="例: 4月1日に○○イベントを開催します！">
    </div>

    <hr class="divider">
    <div class="section-label">サムネイル画像</div>

    <div class="img-row">
        <img class="img-thumb" id="thumb-img" src="" alt="" style="display:none;">
        <span class="img-path" id="thumb-path">未選択</span>
        <button class="btn-img-pick" id="thumb-pick">📂 選択</button>
    </div>

    <hr class="divider">
    <div class="section-label">本文</div>

    <div class="form-group">
        <div class="tb-bar">
            <button type="button" class="tb-btn" id="tb-bold"   title="太字 (Ctrl+B)"><b>B</b></button>
            <button type="button" class="tb-btn" id="tb-italic" title="斜体 (Ctrl+I)"><i>I</i></button>
            <span class="tb-sep"></span>
            <button type="button" class="tb-btn" id="tb-br"   title="改行を挿入">↵ 改行</button>
            <button type="button" class="tb-btn" id="tb-link" title="リンクを挿入">🔗 リンク</button>
            <span class="tb-hint">文字を選択してボタンを押す ／ Ctrl+B 太字 ／ Ctrl+I 斜体</span>
        </div>
        <textarea id="f-content" rows="14" placeholder="普通に文章を書いてください。&#10;Enterキーで改行できます。&#10;&#10;太字にしたい部分は選択して B ボタンを押してください。"></textarea>
        <div class="hint">改行はそのまま反映されます。HTMLタグも直接書けます。</div>
    </div>

    <div class="form-group">
        <label style="display:flex;align-items:center;cursor:pointer;">
            <input type="checkbox" id="f-hidden"> 非表示（下書きとして保存）
        </label>
    </div>

</div>

<div class="editor-footer">
    <button class="btn-cancel" id="btn-cancel">キャンセル</button>
    <span class="status-msg" id="status-msg"></span>
    <button class="btn-publish" id="btn-publish">公開する</button>
</div>

<script>
'use strict';

let mode          = 'add';   // 'add' | 'edit'
let thumbLocalPath = '';
let thumbRepoPath  = '';
let existingImage  = '';     // 編集時の既存画像パス

// 今日の日付をデフォルトに
document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);

/* ── 編集モード初期化 ── */
window.api.onInit((data) => {
    if (!data || !data.article) return;
    mode = 'edit';
    document.getElementById('editor-title').textContent = 'ニュースを編集';
    document.getElementById('btn-publish').textContent  = '更新する';

    const a = data.article;
    document.getElementById('f-id').value       = a.id || '';
    document.getElementById('f-id').disabled    = true;
    document.getElementById('f-date').value     = (a.date || '').replace(/\./g, '-');
    document.getElementById('f-category').value = a.category || 'お知らせ';
    document.getElementById('f-title').value    = a.title   || '';
    document.getElementById('f-desc').value     = a.desc    || '';
    document.getElementById('f-content').value  = a.content || '';
    document.getElementById('f-hidden').checked = !!a.hidden;

    if (a.image) {
        existingImage = a.image;
        thumbRepoPath = a.image;
        document.getElementById('thumb-path').textContent = a.image;
    }
});

/* ── サムネイル選択 ── */
document.getElementById('thumb-pick').addEventListener('click', async () => {
    const lp = await window.api.pickImage();
    if (!lp) return;
    thumbLocalPath = lp;
    document.getElementById('thumb-path').textContent = lp.split(/[\\/]/).pop();
    document.getElementById('thumb-img').src = lp;
    document.getElementById('thumb-img').style.display = '';
});

/* ── 公開（確認なし・運営版） ── */
document.getElementById('btn-publish').addEventListener('click', async () => {
    const id    = document.getElementById('f-id').value.trim();
    const title = document.getElementById('f-title').value.trim();
    const date  = document.getElementById('f-date').value;

    if (!id)    return alert('IDを入力してください');
    if (!title) return alert('タイトルを入力してください');
    if (!date)  return alert('日付を選択してください');

    setStatus('保存中...', 'saving');
    document.getElementById('btn-publish').disabled = true;

    try {
        // 新しい画像が選ばれた場合のみコピー
        if (thumbLocalPath) {
            const ext = thumbLocalPath.split('.').pop();
            thumbRepoPath = `assets/news/${date}/${id}.${ext}`;
            await window.api.copyImageToAssets(thumbLocalPath, thumbRepoPath);
        }

        const dateFormatted = date.replace(/-/g, '.');
        const newsItem = {
            id,
            hidden:    document.getElementById('f-hidden').checked || undefined,
            title,
            date:      dateFormatted,
            category:  document.getElementById('f-category').value,
            image:     thumbRepoPath || undefined,
            imagePath: thumbRepoPath || undefined,
            desc:      document.getElementById('f-desc').value.trim() || undefined,
            content:   contentToHtml(document.getElementById('f-content').value),
        };
        Object.keys(newsItem).forEach(k => newsItem[k] === undefined && delete newsItem[k]);

        // 1. 既存データ読み込み → 追加 or 更新
        const items = await window.api.readData('news');
        if (mode === 'edit') {
            const idx = items.findIndex(i => i.id === id);
            if (idx >= 0) items[idx] = newsItem;
            else          items.unshift(newsItem);
        } else {
            items.unshift(newsItem);
        }
        await window.api.writeData('news', items);

        // 2. スタブ生成
        await window.api.runStubs(['--news']);

        // 3. GitHub コミット
        const slug  = id.replace(/_/g, '-').toLowerCase();
        const files = ['data/news.js', `news/${slug}/index.html`];
        if (thumbLocalPath && thumbRepoPath) files.push(thumbRepoPath);
        const msg = mode === 'edit' ? `[運営] ニュース更新: ${title}` : `[運営] ニュース追加: ${title}`;
        await window.api.commitToGitHub(files, msg);

        setStatus('✅ 公開しました！', 'ok');
        setTimeout(() => window.api.closeEditor(), 1500);

    } catch (err) {
        setStatus(`❌ ${err.message}`, 'error');
        document.getElementById('btn-publish').disabled = false;
    }
});

document.getElementById('btn-cancel').addEventListener('click', () => window.api.closeEditor());

/* ── 書式ツールバー ── */
(function () {
    const ta = document.getElementById('f-content');
    function wrapSel(open, close) {
        const s = ta.selectionStart, e = ta.selectionEnd;
        const sel = ta.value.substring(s, e);
        ta.value = ta.value.substring(0, s) + open + sel + close + ta.value.substring(e);
        ta.selectionStart = s + open.length;
        ta.selectionEnd   = s + open.length + sel.length;
        ta.focus();
    }
    document.getElementById('tb-bold').addEventListener('click',   () => wrapSel('<strong>', '</strong>'));
    document.getElementById('tb-italic').addEventListener('click', () => wrapSel('<em>', '</em>'));
    document.getElementById('tb-br').addEventListener('click', () => {
        const pos = ta.selectionStart;
        ta.value = ta.value.substring(0, pos) + '<br>\n' + ta.value.substring(pos);
        ta.selectionStart = ta.selectionEnd = pos + 5;
        ta.focus();
    });
    document.getElementById('tb-link').addEventListener('click', () => {
        const url = prompt('リンク先URL（例: https://x.com/xxx）:');
        if (!url) return;
        const s = ta.selectionStart, e = ta.selectionEnd;
        const sel = ta.value.substring(s, e) || 'リンクテキスト';
        const ins = '<a href="' + url + '">' + sel + '</a>';
        ta.value = ta.value.substring(0, s) + ins + ta.value.substring(e);
        ta.selectionStart = s; ta.selectionEnd = s + ins.length;
        ta.focus();
    });
    ta.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'b') { e.preventDefault(); wrapSel('<strong>', '</strong>'); }
        if (e.ctrlKey && e.key === 'i') { e.preventDefault(); wrapSel('<em>', '</em>'); }
    });
})();

/* プレーンテキストの改行を <br> に変換（HTMLタグがなければ） */
function contentToHtml(text) {
    if (/<[a-z][\s\S]*?>/i.test(text)) return text;
    return text.replace(/\n/g, '<br>\n');
}

function setStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
}
</script>
</body>
</html>
