<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャスト編集</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>

<div class="editor-header">
    <h1 id="editor-title">キャストを追加</h1>
    <span class="badge-owner">👑 運営版</span>
</div>

<div class="editor-scroll">

    <div class="section-label">基本情報</div>

    <div class="cols-2">
        <div class="form-group">
            <label>ID <span class="required">*</span></label>
            <input type="text" id="f-id" placeholder="例: sakura（英数字・ハイフン）">
            <div class="hint">URLやシステム内部で使われます。追加後は変更不可。</div>
        </div>
        <div class="form-group">
            <label>公開レベル</label>
            <select id="f-revealLevel">
                <option value="3">3 — 完全公開</option>
                <option value="2">2 — シルエット</option>
                <option value="1">1 — Coming Soon</option>
                <option value="0">0 — 非表示</option>
            </select>
        </div>
    </div>

    <div class="cols-2">
        <div class="form-group">
            <label>表示名（フル） <span class="required">*</span></label>
            <input type="text" id="f-name" placeholder="例: さくら（飼育）">
        </div>
        <div class="form-group">
            <label>一覧表示名</label>
            <input type="text" id="f-pickupName" placeholder="省略時は表示名を使用">
        </div>
    </div>

    <div class="cols-3">
        <div class="form-group">
            <label>肩書きラベル</label>
            <input type="text" id="f-tagLabel" placeholder="例: 飼育">
        </div>
        <div class="form-group">
            <label>担当動物</label>
            <input type="text" id="f-motifAnimal" placeholder="例: 猫">
        </div>
        <div class="form-group">
            <label>区画（セクション）</label>
            <select id="f-section">
                <option value="飼育区画">飼育区画</option>
                <option value="野生区画">野生区画</option>
                <option value="妖怪区画">妖怪区画</option>
                <option value="運営部">運営部</option>
                <option value="スタッフ">スタッフ</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>タグ（スペース区切り）</label>
        <input type="text" id="f-tags" placeholder="例: 飼育 キャスト">
        <div class="hint">絞り込みフィルターには section を使用。タグは背景色・フレーム色に影響します。</div>
    </div>

    <div class="form-group">
        <label>公開日（revealDate）</label>
        <input type="date" id="f-revealDate">
    </div>

    <hr class="divider">
    <div class="section-label">画像</div>

    <div class="form-group">
        <label>モチーフアイコン</label>
        <div class="img-row" id="motif-row">
            <img class="img-thumb" id="motif-thumb" src="" alt="" style="display:none;">
            <span class="img-path" id="motif-path">未選択</span>
            <button class="btn-img-pick" id="motif-pick">📂 選択</button>
        </div>
    </div>

    <div class="form-group">
        <label>プロフィール画像（複数可）</label>
        <div id="profile-images-list" class="dynamic-list"></div>
        <button class="btn-add-row" id="add-profile-img">＋ 画像を追加</button>
    </div>

    <div class="form-group" id="silhouette-wrap">
        <label>シルエット画像（公開レベル2用）</label>
        <div class="img-row" id="silhouette-row">
            <img class="img-thumb" id="silhouette-thumb" src="" alt="" style="display:none;">
            <span class="img-path" id="silhouette-path">未選択</span>
            <button class="btn-img-pick" id="silhouette-pick">📂 選択</button>
        </div>
    </div>

    <hr class="divider">
    <div class="section-label">紹介文・プロフィール <span class="badge-guard" style="vertical-align:middle;">⚠ 要許可</span></div>

    <div class="form-group">
        <label>自己紹介（HTML可）</label>
        <textarea id="f-introduction" rows="6" placeholder="<p>こんにちは！</p>"></textarea>
    </div>

    <div class="form-group">
        <label>目標・夢（1行1つ）</label>
        <div id="goals-list" class="dynamic-list"></div>
        <button class="btn-add-row" id="add-goal">＋ 目標を追加</button>
    </div>

    <hr class="divider">
    <div class="section-label">SNSリンク</div>

    <div id="socials-list" class="dynamic-list"></div>
    <button class="btn-add-row" id="add-social">＋ SNSを追加</button>

    <hr class="divider">
    <div class="section-label">その他</div>

    <div class="form-group">
        <label>関連キャストID（スペース区切り）</label>
        <input type="text" id="f-related" placeholder="例: ten momo">
    </div>

    <div class="form-group">
        <label style="display:flex;align-items:center;cursor:pointer;">
            <input type="checkbox" id="f-hidden"> 本番環境で非表示にする
        </label>
    </div>

</div>

<div class="editor-footer">
    <button class="btn-cancel" id="btn-cancel">キャンセル</button>
    <span class="status-msg" id="status-msg"></span>
    <button class="btn-publish" id="btn-publish">公開する</button>
</div>

<script>
'use strict';

const SOCIAL_TYPES = ['youtube','twitter','booth','facebook','vrchat','linktr.ee','kindle','instagram','tiktok','その他'];

/* ── ローカル状態 ── */
let mode = 'add'; // 'add' | 'edit'
let originalIntro = '';
let motifIconPath = '';
let silhouettePath = '';
let profileImages = []; // [{ localPath?, repoPath }]

/* ── DOM 参照 ── */
const editorTitle   = document.getElementById('editor-title');
const fId           = document.getElementById('f-id');
const fRevealLevel  = document.getElementById('f-revealLevel');
const fName         = document.getElementById('f-name');
const fPickupName   = document.getElementById('f-pickupName');
const fTagLabel     = document.getElementById('f-tagLabel');
const fMotifAnimal  = document.getElementById('f-motifAnimal');
const fSection      = document.getElementById('f-section');
const fTags         = document.getElementById('f-tags');
const fRevealDate   = document.getElementById('f-revealDate');
const fIntroduction = document.getElementById('f-introduction');
const fRelated      = document.getElementById('f-related');
const fHidden       = document.getElementById('f-hidden');
const motifThumb    = document.getElementById('motif-thumb');
const motifPathEl   = document.getElementById('motif-path');
const silThumb      = document.getElementById('silhouette-thumb');
const silPathEl     = document.getElementById('silhouette-path');
const profileList   = document.getElementById('profile-images-list');
const goalsList     = document.getElementById('goals-list');
const socialsList   = document.getElementById('socials-list');
const statusMsg     = document.getElementById('status-msg');
const btnPublish    = document.getElementById('btn-publish');

/* ── 初期化 ── */
window.api.onInit(async (data) => {
    if (data && data.member) {
        mode = 'edit';
        editorTitle.textContent = 'キャストを編集';
        fId.disabled = true;
        populateForm(data.member);
        originalIntro = fIntroduction.value;
    }
});

function populateForm(m) {
    fId.value          = m.id          || '';
    fRevealLevel.value = String(m.revealLevel ?? 3);
    fName.value        = m.name        || '';
    fPickupName.value  = m.pickupName  || '';
    fTagLabel.value    = m.tagLabel    || '';
    fMotifAnimal.value = m.motifAnimal || '';
    fSection.value     = m.section     || '飼育区画';
    fTags.value        = m.tags        || '';
    fRevealDate.value  = (m.revealDate || '').replace(/\./g, '-');
    fIntroduction.value= m.introduction|| '';
    fRelated.value     = (m.related || []).join(' ');
    fHidden.checked    = !!m.hidden;

    if (m.motifIcon) {
        motifIconPath = m.motifIcon;
        motifPathEl.textContent = m.motifIcon;
        motifThumb.src = m.motifIcon;
        motifThumb.style.display = '';
    }
    if (m.silhouetteImage) {
        silhouettePath = m.silhouetteImage;
        silPathEl.textContent = m.silhouetteImage;
        silThumb.src = m.silhouetteImage;
        silThumb.style.display = '';
    }
    profileImages = (m.profileImages || (m.image ? [m.image] : [])).map(p => ({ repoPath: p }));
    renderProfileImages();
    (m.goals || []).forEach(g => addGoalRow(g));
    (m.socials || []).forEach(s => addSocialRow(s.type, s.url));
}

/* ── プロフィール画像リスト ── */
function renderProfileImages() {
    profileList.innerHTML = '';
    profileImages.forEach((img, idx) => {
        const row = document.createElement('div');
        row.className = 'img-row';
        row.innerHTML = `
            <img class="img-thumb" src="${img.repoPath || ''}" alt="" style="${img.repoPath?'':'display:none'}">
            <span class="img-path">${img.repoPath || '（ローカルから選択済み）'}</span>
            <button class="btn-img-pick" data-idx="${idx}">📂 変更</button>
            <button class="btn-remove" data-idx="${idx}">✕</button>
        `;
        row.querySelectorAll('[data-idx]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const i = parseInt(btn.dataset.idx);
                if (btn.classList.contains('btn-remove')) {
                    profileImages.splice(i, 1);
                    renderProfileImages();
                } else {
                    const lp = await window.api.pickImage();
                    if (lp) {
                        profileImages[i] = { localPath: lp, repoPath: '' };
                        renderProfileImages();
                    }
                }
            });
        });
        profileList.appendChild(row);
    });
}

document.getElementById('add-profile-img').addEventListener('click', async () => {
    const lp = await window.api.pickImage();
    if (lp) {
        profileImages.push({ localPath: lp, repoPath: '' });
        renderProfileImages();
    }
});

/* ── モチーフアイコン ── */
document.getElementById('motif-pick').addEventListener('click', async () => {
    const lp = await window.api.pickImage();
    if (!lp) return;
    const id = fId.value.trim() || 'member';
    const ext = lp.split('.').pop();
    const destRel = `assets/motif/${id}.${ext}`;
    motifIconPath = await window.api.copyImageToAssets(lp, destRel);
    motifPathEl.textContent = motifIconPath;
    motifThumb.src = lp; motifThumb.style.display = '';
});

/* ── シルエット ── */
document.getElementById('silhouette-pick').addEventListener('click', async () => {
    const lp = await window.api.pickImage();
    if (!lp) return;
    const id = fId.value.trim() || 'member';
    const ext = lp.split('.').pop();
    const destRel = `assets/member/${id}/profile_silhouette.${ext}`;
    silhouettePath = await window.api.copyImageToAssets(lp, destRel);
    silPathEl.textContent = silhouettePath;
    silThumb.src = lp; silThumb.style.display = '';
});

/* ── 目標リスト ── */
function addGoalRow(val = '') {
    const row = document.createElement('div');
    row.className = 'dynamic-row';
    row.innerHTML = `<input type="text" placeholder="例: 人間のお金を稼ぐこと" value="${escHtml(val)}">
                     <button class="btn-remove">✕</button>`;
    row.querySelector('.btn-remove').addEventListener('click', () => row.remove());
    goalsList.appendChild(row);
}
document.getElementById('add-goal').addEventListener('click', () => addGoalRow());

/* ── SNSリスト ── */
function addSocialRow(type = 'twitter', url = '') {
    const row = document.createElement('div');
    row.className = 'dynamic-row';
    const opts = SOCIAL_TYPES.map(t => `<option value="${t}"${t===type?' selected':''}>${t}</option>`).join('');
    row.innerHTML = `<select style="max-width:130px;">${opts}</select>
                     <input type="url" placeholder="https://..." value="${escHtml(url)}">
                     <button class="btn-remove">✕</button>`;
    row.querySelector('.btn-remove').addEventListener('click', () => row.remove());
    socialsList.appendChild(row);
}
document.getElementById('add-social').addEventListener('click', () => addSocialRow());

/* ── フォーム送信 ── */
async function buildMember() {
    const id = fId.value.trim();
    if (!id) throw new Error('IDを入力してください');
    if (!fName.value.trim()) throw new Error('表示名を入力してください');

    // プロフィール画像をアップロード
    const uploadedPaths = [];
    for (const img of profileImages) {
        if (img.localPath) {
            const ext = img.localPath.split('.').pop();
            const dest = `assets/member/${id}/profile_${Date.now()}.${ext}`;
            const uploaded = await window.api.copyImageToAssets(img.localPath, dest);
            uploadedPaths.push(uploaded);
        } else if (img.repoPath) {
            uploadedPaths.push(img.repoPath);
        }
    }

    const goals = Array.from(goalsList.querySelectorAll('input'))
        .map(i => i.value.trim()).filter(Boolean);
    const socials = Array.from(socialsList.querySelectorAll('.dynamic-row')).map(row => ({
        type: row.querySelector('select').value,
        url:  row.querySelector('input').value.trim(),
    })).filter(s => s.url);
    const related = fRelated.value.trim().split(/\s+/).filter(Boolean);

    const member = {
        id,
        revealLevel: parseInt(fRevealLevel.value),
        name:         fName.value.trim(),
        pickupName:   fPickupName.value.trim() || undefined,
        tagLabel:     fTagLabel.value.trim(),
        motifAnimal:  fMotifAnimal.value.trim(),
        section:      fSection.value,
        tags:         fTags.value.trim(),
        introduction: fIntroduction.value.trim(),
        profileImages: uploadedPaths,
        image:         uploadedPaths[0] || undefined,
        motifIcon:     motifIconPath || undefined,
        silhouetteImage: silhouettePath || undefined,
        revealDate:    fRevealDate.value || undefined,
        goals:         goals.length ? goals : undefined,
        socials:       socials.length ? socials : undefined,
        related:       related.length ? related : undefined,
        hidden:        fHidden.checked || undefined,
    };
    // undefined フィールドを除去
    Object.keys(member).forEach(k => member[k] === undefined && delete member[k]);
    return member;
}

btnPublish.addEventListener('click', async () => {
    try {
        const member = await buildMember();
        // 運営版: 確認ダイアログなし
        setStatus('保存中...', 'saving');
        btnPublish.disabled = true;

        // 1. ローカルに書き込む
        const items = await window.api.readData('members');
        const idx = items.findIndex(m => m.id === member.id);
        if (idx >= 0) items[idx] = member;
        else items.unshift(member);
        await window.api.writeData('members', items);

        // 2. スタブ生成
        await window.api.runStubs(['--cast']);

        // 3. GitHub コミット
        const commitFiles = ['data/members.js', `cast/${member.id}/index.html`];
        if (motifIconPath) commitFiles.push(motifIconPath);
        for (const p of (member.profileImages || [])) commitFiles.push(p);
        if (silhouettePath) commitFiles.push(silhouettePath);

        await window.api.commitToGitHub(
            [...new Set(commitFiles)],
            `キャスト${mode === 'add' ? '追加' : '更新'}: ${member.name}`
        );

        setStatus('✅ 公開しました！', 'ok');
        setTimeout(() => window.api.closeEditor(), 1500);

    } catch (err) {
        setStatus(`❌ ${err.message}`, 'error');
        btnPublish.disabled = false;
    }
});

/* ── キャンセル ── */
document.getElementById('btn-cancel').addEventListener('click', () => window.api.closeEditor());

/* ── ヘルパー ── */
function setStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = `status-msg ${type}`;
}
function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
