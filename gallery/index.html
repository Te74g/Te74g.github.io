<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あにあめもりあ | ギャラリー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;600;700;900&family=Zen+Old+Mincho:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="../assets/favicon/multi_favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="bg-texture">
    <a class="skip-link" href="#main">本文へスキップ</a>

    <div id="header-placeholder"></div>

    <main id="main">

        <!-- ========== Album Book Section ========== -->
        <section class="section u-pb-xs" id="album-section">
            <div class="container">
                <header class="section-head reveal">
                    <h1 class="section-title cafe-signboard">ギャラリー</h1>
                    <p class="section-lead">記憶のアルバム</p>
                </header>

                <!-- Album Book (generated by album-book.js) -->
                <div class="album-scene reveal" id="album-scene"></div>

                <div style="text-align: center; margin-top: 32px;">
                    <button class="btn btn--ghost" id="scroll-to-polaroid">もっと見る ↓</button>
                </div>
            </div>
        </section>

        <!-- ========== Polaroid Grid Section ========== -->
        <section class="section u-pt-xs" id="polaroid-section">
            <div class="container">
                <header class="section-head reveal" style="margin-bottom: 4px;">
                    <h2 class="section-title cafe-signboard" style="font-size: clamp(1.1rem,3vw,1.4rem);">思い出の断片</h2>
                    <p class="section-lead">積み重なった記憶たち。</p>
                </header>

                <div class="gallery-film-strip" aria-hidden="true"></div>

                <!-- Gallery Grid (generated by gallery.js) -->
                <div id="gallery-grid" class="gallery-grid"></div>

                <div style="margin-top: 40px; text-align: center;">
                    <a href="../index.html" class="btn btn--primary">トップへ戻る</a>
                </div>
            </div>
        </section>

    </main>

    <!-- Lightbox / Modal for viewing images -->
    <div id="gallery-modal" class="gallery-modal" aria-hidden="true" style="display:none;">
        <div class="gallery-modal-overlay"></div>
        <div class="gallery-modal-content">
            <button class="gallery-modal-close" aria-label="閉じる">×</button>
            <div class="gallery-slider">
                <button class="gallery-nav prev" aria-label="前へ">‹</button>
                <div class="gallery-slide-track" id="modal-track">
                    <!-- Images injected here -->
                </div>
                <button class="gallery-nav next" aria-label="次へ">›</button>
            </div>
            <div class="gallery-info">
                <h3 id="modal-title" style="margin:0; color:#fff;"></h3>
                <p id="modal-desc" style="margin:8px 0 0; color:#ddd; font-size:0.9rem;"></p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="../js/common-layout.js"></script>
    <script>
        renderLayout('../');
    </script>
    <!-- Data Files -->
    <script src="../_config/data_site.js"></script>
    <script src="../_config/data_members.js"></script>
    <script src="../_config/data_news.js"></script>
    <script src="../_config/data_events.js"></script>
    <script src="../_config/data_gallery.js"></script>
    <script src="../_config/data_links.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/album-book.js"></script>
    <script src="../js/gallery.js"></script>
    <script>
        // 「もっと見る」ボタン → ポラロイドセクションへスムーズスクロール
        document.getElementById('scroll-to-polaroid').addEventListener('click', function () {
            const target = document.getElementById('polaroid-section');
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    </script>
</body>

</html>
